<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Nuevo Producto | MULTIPRO PERU S.A.C.</title>
    <link rel="stylesheet" href="/css/stylesnuevacat.css">
    <link rel="stylesheet" href="/css/modals.css"></link>
</head>

<body>


<header class="topbar">
    <h1>MULTIPRO PERU S.A.C.</h1>
    <span>Registrar Nueva Categoría</span>
</header>

<main class="container">

    <div class="header-section">
        <h2><b>Nueva Categoría</b></h2>
    </div>

    <section class="form-contenedor">
        <form th:action="@{/guardarCategoria}" th:object="${categoria}" method="post">

            <label>ID de Categoría</label>
            <input type="text"
                   th:field="*{id_Categoria}"
                   readonly
                   placeholder="Se genera automáticamente">

            <label>Categoría</label>
            <input type="text" th:field="*{catNombre}">

            <div class="botones-form">
                <button type="submit" class="btn" onclick="mostrarGuardar()">Guardar</button>
                <a href="/Categoria" class="btn-cancelar">Cancelar</a>
            </div>
        </form>
    </section>
</main>

<div id="modalGuardar" class="modal-overlay" style="display:none;">

    <div class="modal-contenido">

        <div class="modal-icono">✔</div>

        <p class="modal-texto">
            Los cambios se guardaron correctamente.
        </p>

        <button class="btn-azul" onclick="cerrarGuardar()">
            Aceptar
        </button>

    </div>

</div>

<script src="/js/modals.js"></script>

<footer>
    <p>© 2026 MULTIPRO PERU S.A.C. | Sistema Interno</p>
</footer>


</body>

</html>
